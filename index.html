<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>توتيلي ستور</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
    background: #111;
    color: white;
}

/* زر القائمة */
.menu-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    font-size: 30px;
    cursor: pointer;
}

/* القائمة الجانبية */
.sidebar {
    position: fixed;
    top: 0;
    right: -250px;
    width: 250px;
    height: 100%;
    background: #222;
    padding-top: 50px;
    transition: 0.3s;
}

.sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #00b894;
}

h1 {
    text-align: center;
    padding: 20px;
}

.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.product {
    background: #1e1e1e;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    width: 220px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    width: 100%;
    background: #00b894;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* البوب اب */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.popup-box {
    background: #222;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

.big-btn {
    padding: 15px;
    margin: 10px;
    width: 200px;
    font-size: 18px;
}
</style>

</head>
<body>

<!-- زر الثلاث خطوط -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- القائمة -->
<div class="sidebar" id="menu">
    <a href="#" onclick="showHome()">الرئيسية</a>
    <a href="#" onclick="showProducts()">الطلبات</a>
</div>

<h1 id="title">أهلا وسهلا بكم في متجر توتيلي ستور</h1>

<div class="products" id="products">

<div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>منتج 1</h3>
    <p>50 ريال</p>
    <button onclick="openPopup('منتج 1')">طلب</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>منتج 2</h3>
    <p>80 ريال</p>
    <button onclick="openPopup('منتج 2')">طلب</button>
</div>

</div>

<!-- البوب اب -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>اختر طريقة التواصل</h3>

        <button class="big-btn" onclick="contact('whatsapp')">واتساب</button>
        <button class="big-btn" onclick="contact('instagram')">انستقرام</button>
        <br>
        <button onclick="closePopup()">إغلاق</button>
    </div>
</div>

<script>
function openMenu(){
    document.getElementById("menu").style.right = "0";
}

function showHome(){
    document.getElementById("title").style.display = "block";
    document.getElementById("products").style.display = "none";
    document.getElementById("menu").style.right = "-250px";
}

function showProducts(){
    document.getElementById("title").style.display = "none";
    document.getElementById("products").style.display = "flex";
    document.getElementById("menu").style.right = "-250px";
}

let selectedProduct = "";

function openPopup(product){
    selectedProduct = product;
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

function contact(type){
    if(type === "whatsapp"){
        window.open("https://wa.me/966534927605?text=أبغى أطلب " + selectedProduct);
    } else {
        window.open("https://instagram.com/2telel");
    }
}
</script>

</body>
</html>
