<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>توتيلي ستور</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
    background: #111;
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.product {
    background: #1e1e1e;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    width: 220px;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    width: 100%;
    background: #00b894;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.popup-box {
    background: #222;
    padding: 20px;
    border-radius: 10px;
}

.close {
    background: red;
}
</style>

</head>
<body>

<h1>أهلا وسهلا بكم في متجر توتيلي ستور</h1>

<div class="products">

<div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>منتج 1</h3>
    <p>50 ريال</p>
    <button onclick="openPopup('منتج 1')">طلب</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>منتج 2</h3>
    <p>80 ريال</p>
    <button onclick="openPopup('منتج 2')">طلب</button>
</div>

</div>

<!-- نافذة الاختيار -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>اختر طريقة التواصل</h3>

        <button onclick="contact('whatsapp')">واتساب</button>
        <button onclick="contact('instagram')">انستقرام</button>
        <button class="close" onclick="closePopup()">إغلاق</button>
    </div>
</div>

<script>
let selectedProduct = "";

function openPopup(product) {
    selectedProduct = product;
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function contact(type) {
    if(type === "whatsapp"){
        window.open("https://wa.me/966XXXXXXXXX?text=أبغى أطلب " + selectedProduct);
    } else {
        window.open("https://instagram.com/USERNAME");
    }
}
</script>

</body>
</html>
